<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SN-Viz — Page Not Found</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://snviz.com/">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/icon32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/icon16.png">
  <link rel="apple-touch-icon" sizes="128x128" href="/images/icon128.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0A0F; --fg: #FAFAFA; --muted-fg: #71717A;
      --accent: #F59E0B; --border: rgba(255,255,255,0.08);
    }
    body {
      background: var(--bg); color: var(--fg);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .code {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 700; letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent), rgba(245,158,11,0.4));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1; margin-bottom: 24px;
    }
    h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: clamp(20px, 4vw, 28px); font-weight: 600;
      margin-bottom: 12px;
    }
    p { color: var(--muted-fg); font-size: 15px; margin-bottom: 36px; line-height: 1.6; }
    a.btn {
      display: inline-block; padding: 12px 28px;
      background: var(--accent); color: #0A0A0F;
      font-weight: 600; font-size: 14px; border-radius: 8px;
      text-decoration: none; transition: opacity .15s;
    }
    a.btn:hover { opacity: 0.85; }
    .logo { margin-bottom: 48px; }
    .logo img { height: 28px; width: auto; }
  </style>
</head>

<body>
  <div class="logo">
    <a href="/"><img src="/images/logo/SN-Viz-Logo.png" alt="SN-Viz"></a>
  </div>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn">Back to Home</a>
</body>

</html>
